name: Quality and reference data

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 2 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m unittest discover -s tests -v
      - run: python -m compileall -q main.py src tests scripts
      - run: python scripts/validate_reference_data.py

  refresh-reference:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pandas yfinance
      - run: python scripts/update_index_reference.py
      - run: python scripts/validate_reference_data.py
      - name: Commit refreshed reference data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/index_ref_data.csv data/reference_metadata.json
          git diff --cached --quiet || git commit -m "참조 지수 데이터 월간 갱신"
          git push
